<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%VITE_SITE_TITLE%</title>
  <meta name="description" content="%VITE_SITE_DESCRIPTION%" />

  <!-- SEO -->
  <link rel="canonical" href="%VITE_SITE_URL%" />
  <meta name="keywords" content="..." />

  <!-- Open Graph -->
  <meta property="og:title" content="%VITE_SITE_TITLE%" />
  <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
  <meta property="og:image" content="%VITE_SITE_IMAGE%" />
  <meta property="og:url" content="%VITE_SITE_URL%" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
  <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
  <meta name="twitter:image" content="%VITE_SITE_IMAGE%" />
  <meta name="twitter:card" content="%VITE_SITE_IMAGE%" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <!-- <link rel="icon" href="/favicon.svg" type="image/svg+xml" /> -->

  <!-- Theme -->
  <meta name="theme-color" content="#0d6efd" />
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
